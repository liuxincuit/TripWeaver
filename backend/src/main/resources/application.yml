server:
  port: 8080

spring:
  application:
    name: tripweaver

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-test-key}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

jwt:
  secret: ${JWT_SECRET:test-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000

logging:
  level:
    com.tripweaver: DEBUG
