server:
  port: 8080

spring:
  application:
    name: tripweaver

  datasource:
    url: jdbc:sqlite:./data/tripweaver.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-test-key}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o}
          temperature: 0.7

jwt:
  secret: ${JWT_SECRET:test-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000

logging:
  level:
    com.tripweaver: DEBUG
  file:
    name: logs/tripweaver.log

searxng:
  base-url: ${SEARXNG_BASE_URL}
  retry-count: 3
  retry-delay-ms: 1000
